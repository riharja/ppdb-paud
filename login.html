<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PPDB PAUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // PASTIKAN DIGANTI DENGAN URL & KEY SUPABASE MILIKMU SENDIRI
        const SUPABASE_URL = "https://id-project-kamu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-success fw-bold">Login Wali Murid</h3>
                
                <form id="formLogin">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="nama@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="Masukkan password" required>
                    </div>
                    <button type="submit" id="btnLogin" class="btn btn-success w-100 py-2">Masuk</button>
                </form>
                
                <p class="text-center mt-3 small mb-0">Belum punya akun? <a href="register.html" class="text-success fw-bold">Daftar sekarang</a></p>
            </div>
        </div>
    </div>

    <script>
        const formLogin = document.getElementById('formLogin');
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnLogin = document.getElementById('btnLogin');
            btnLogin.innerText = "Memproses...";
            btnLogin.disabled = true;

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                alert("Login berhasil!");
                window.location.href = "index.html";
            } catch (err) {
                alert("🚨 LOGIN GAGAL:\n" + err.message + "\n\nPastikan akun sudah dikonfirmasi lewat email atau kredensial benar.");
            } finally {
                btnLogin.innerText = "Masuk";
                btnLogin.disabled = false;
            }
        });
    </script>
</body>
</html>
