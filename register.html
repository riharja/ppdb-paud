<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Akun PPDB PAUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // PASTIKAN DIGANTI DENGAN URL & KEY SUPABASE MILIKMU SENDIRI
        const SUPABASE_URL = "https://id-project-kamu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-success fw-bold">Buat Akun Wali</h3>
                
                <form id="formRegister">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="nama@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="Minimal 6 karakter" required>
                    </div>
                    <button type="submit" id="btnRegister" class="btn btn-success w-100 py-2">Daftar Akun</button>
                </form>
                
                <p class="text-center mt-3 small mb-0">Sudah punya akun? <a href="login.html" class="text-success fw-bold">Login di sini</a></p>
            </div>
        </div>
    </div>

    <script>
        const formRegister = document.getElementById('formRegister');
        formRegister.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnRegister = document.getElementById('btnRegister');
            btnRegister.innerText = "Mendaftar...";
            btnRegister.disabled = true;

            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                alert("Pendaftaran berhasil! Silakan cek kotak masuk email kamu untuk konfirmasi, lalu silakan Login.");
                window.location.href = "login.html";
            } catch (err) {
                alert("🚨 PENDAFTARAN GAGAL:\n" + err.message);
            } finally {
                btnRegister.innerText = "Daftar Akun";
                btnRegister.disabled = false;
            }
        });
    </script>
</body>
</html>
