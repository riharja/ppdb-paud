<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Akun PPDB PAUD</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Library Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // JANGAN LUPA GANTI DENGAN URL & KEY SUPABASE MILIKMU
        const SUPABASE_URL = "https://xyz-id-kamu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-success fw-bold">Buat Akun Wali</h3>
                
                <form id="formRegister">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="nama@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="Minimal 6 karakter" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">Daftar Akun</button>
                </form>
                
                <p class="text-center mt-3 small mb-0">Sudah punya akun? <a href="login.html" class="text-success fw-bold">Login di sini</a></p>
            </div>
        </div>
    </div>

    <script>
        const formRegister = document.getElementById('formRegister');
        formRegister.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            // Proses Registrasi ke Supabase Auth
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                alert("Gagal mendaftar: " + error.message);
            } else {
                alert("Pendaftaran berhasil! Silakan cek email kamu untuk konfirmasi, lalu silakan Login.");
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
