<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status Kelulusan PPDB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // JANGAN LUPA GANTI DENGAN URL & KEY SUPABASE MILIKMU SENDIRI
        const SUPABASE_URL = "https://xyz-id-kamu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">PAUD Sinergi</a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm fw-bold">Kembali ke Form</a>
            </div>
        </div>
    </nav>

    <div class="container my-5 text-center">
        <h2 class="fw-bold text-success">Cek Hasil Seleksi PPDB</h2>
        <p class="text-secondary">Masukkan nama wali/orang tua yang didaftarkan untuk melihat status kelulusan anak Anda.</p>
    </div>

    <div class="container col-md-5 mb-4">
        <div class="card shadow border-0 mb-4">
            <div class="card-body p-4">
                <form id="formCari">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Lengkap Wali / Orang Tua</label>
                        <input type="text" id="inputWali" class="form-control" placeholder="Contoh: Budi Santoso" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">Cari Data Pendaftaran</button>
                </form>
            </div>
        </div>

        <div id="hasilPencarian"></div>
    </div>

    <script>
        const formCari = document.getElementById('formCari');
        
        formCari.addEventListener('submit', async (e) => {
            e.preventDefault();
            const namaWali = document.getElementById('inputWali').value;
            const hasilDiv = document.getElementById('hasilPencarian');
            
            hasilDiv.innerHTML = `<div class="text-center text-muted">Mencari data...</div>`;

            // Mencari data pendaftar berdasarkan nama wali yang mirip (ilike)
            const { data, error } = await supabase
                .from('pendaftar')
                .select('*')
                .ilike('nama_wali', `%${namaWali}%`);

            if (error) {
                return hasilDiv.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }

            if (data.length === 0) {
                return hasilDiv.innerHTML = `<div class="alert alert-warning text-center">Data tidak ditemukan. Pastikan penulisan nama wali sudah sesuai.</div>`;
            }

            // Tampilkan hasil pencarian jika ketemu
            hasilDiv.innerHTML = "";
            data.forEach(siswa => {
                let statusBadge = "";
                let pesanTambahan = "";

                if (siswa.status === "Diproses") {
                    statusBadge = `<span class="badge bg-warning text-dark fs-6">Sedang Diproses</span>`;
                    pesanTambahan = "Mohon menunggu, berkas pendaftaran anak Anda sedang dalam tahap verifikasi oleh tim panitia sekolah.";
                } else if (siswa.status === "Diterima") {
                    statusBadge = `<span class="badge bg-success fs-6">Selamat! Diterima</span>`;
                    pesanTambahan = "Silakan datang ke sekolah dengan membawa cetak kartu bukti pendaftaran untuk melakukan pendaftaran ulang.";
                } else if (siswa.status === "Ditolak") {
                    statusBadge = `<span class="badge bg-danger fs-6">Mohon Maaf, Ditolak</span>`;
                    pesanTambahan = "Kuota pendaftaran tahun ini telah penuh atau berkas Anda tidak memenuhi kriteria verifikasi.";
                }

                hasilDiv.innerHTML += `
                    <div class="card shadow border-0 mb-3 border-start border-5 ${siswa.status === 'Diterima' ? 'border-success' : siswa.status === 'Ditolak' ? 'border-danger' : 'border-warning'}">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-center mb-3">
                                <img src="${siswa.foto_url}" class="rounded-circle me-3" style="width: 50px; height: 50px; object-fit: cover;">
                                <div>
                                    <h5 class="fw-bold mb-0">${siswa.nama_anak}</h5>
                                    <small class="text-muted">Wali: ${siswa.nama_wali}</small>
                                </div>
                            </div>
                            <div class="mb-2"><strong>Status Pengumuman:</strong></div>
                            <div class="mb-3">${statusBadge}</div>
                            <p class="text-secondary small mb-0">${pesanTambahan}</p>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
