<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin PPDB PAUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // GANTI DENGAN URL & KEY SUPABASE MILIKMU
        const SUPABASE_URL = "https://xyz-id-kamu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">Dashboard Admin PAUD</a>
            <a href="index.html" class="btn btn-outline-light btn-sm">Kembali ke Form</a>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="fw-bold mb-4 text-dark">Daftar Calon Siswa Baru</h2>
        
        <div class="card shadow border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Foto</th>
                                <th>Nama Anak</th>
                                <th>Tanggal Lahir</th>
                                <th>Nama Wali</th>
                                <th>Status</th>
                                <th class="text-center">Aksi Seleksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelPendaftar">
                            <tr>
                                <td colspan="6" class="text-center text-muted py-4">Memuat data pendaftar...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fungsi untuk mengambil data pendaftar dari Supabase
        async function muatDataPendaftar() {
            const { data, error } = await supabase
                .from('pendaftar')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error(error);
                return alert("Gagal mengambil data: " + error.message);
            }

            const tbody = document.getElementById('tabelPendaftar');
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">Belum ada pendaftar baru.</td></tr>`;
                return;
            }

            data.forEach(siswa => {
                // Menentukan warna badge berdasarkan status kelulusan
                let badgeColor = "bg-warning text-dark"; // Diproses
                if (siswa.status === "Diterima") badgeColor = "bg-success";
                if (siswa.status === "Ditolak") badgeColor = "bg-danger";

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <img src="${siswa.foto_url}" alt="Foto" class="img-thumbnail" style="width: 60px; height: 60px; object-fit: cover;">
                        </td>
                        <td class="fw-bold">${siswa.nama_anak}</td>
                        <td>${siswa.tanggal_lahir}</td>
                        <td>${siswa.nama_wali}</td>
                        <td><span class="badge ${badgeColor}">${siswa.status}</span></td>
                        <td class="text-center">
                            <button class="btn btn-success btn-sm me-1" onclick="ubahStatus(${siswa.id}, 'Diterima')">Terima</button>
                            <button class="btn btn-danger btn-sm" onclick="ubahStatus(${siswa.id}, 'Ditolak')">Tolak</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Fungsi untuk mengubah status kelulusan (Diterima / Ditolak)
        async function ubahStatus(idSiswa, statusBaru) {
            const { error } = await supabase
                .from('pendaftar')
                .update({ status: statusBaru })
                .eq('id', idSiswa);

            if (error) {
                alert("Gagal memperbarui status: " + error.message);
            } else {
                alert(`Siswa berhasil di-${statusBaru}!`);
                muatDataPendaftar(); // Muat ulang tabel otomatis
            }
        }

        // Jalankan fungsi muat data pertama kali halaman dibuka
        muatDataPendaftar();
    </script>
</body>
</html>
