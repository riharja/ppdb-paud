<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB PAUD Online - Formulir Pendaftaran</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Library Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // JANGAN LUPA GANTI DENGAN URL & KEY SUPABASE MILIKMU
        const SUPABASE_URL = "https://xyz-id-kamu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">PAUD Sinergi</a>
            <div class="ms-auto d-flex align-items-center">
                <span class="text-white me-3 d-none d-sm-inline" id="user-display">Memuat user...</span>
                <button class="btn btn-danger btn-sm" id="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Header Judul -->
    <div class="container my-5 text-center">
        <h1 class="display-5 fw-bold text-success">Penerimaan Siswa Baru (PPDB)</h1>
        <p class="lead text-secondary">Isi formulir pendaftaran di bawah ini secara lengkap.</p>
    </div>

    <!-- Main Form Konten -->
    <div class="container col-md-6 mb-5">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white py-3">
                <h5 class="mb-0 fw-bold">Formulir Pendaftaran Siswa</h5>
            </div>
            <div class="card-body p-4">
                <form id="formPendaftaran">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Lengkap Anak</label>
                        <input type="text" class="form-control" placeholder="Contoh: Ahmad Fauzi" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tanggal Lahir</label>
                        <input type="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Wali / Orang Tua</label>
                        <input type="text" class="form-control" placeholder="Contoh: Budi Santoso" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Upload Foto Anak (Format JPG/PNG)</label>
                        <input type="file" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 mt-3 fw-bold">Kirim Pendaftaran</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Logika JavaScript Sistem -->
    <script>
        // 1. Proteksi Halaman & Tampilkan Email User
        async function cekSesi() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                alert("Sesi tidak ditemukan. Silakan login terlebih dahulu.");
                window.location.href = "login.html";
            } else {
                document.getElementById('user-display').innerText = `Masuk sebagai: ${session.user.email}`;
            }
        }
        cekSesi();

        // 2. Logika Fitur Logout
        const btnLogout = document.getElementById('btn-logout');
        btnLogout.addEventListener('click', async () => {
            await supabase.auth.signOut();
            alert("Berhasil keluar (logout).");
            window.location.href = "login.html";
        });

        // 3. Logika Upload Gambar & Submit Form
        const formPendaftaran = document.getElementById('formPendaftaran');
        formPendaftaran.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const namaAnak = formPendaftaran.querySelector('input[type="text"]').value;
            const fileInput = formPendaftaran.querySelector('input[type="file"]');
            const file = fileInput.files[0];

            if (!file) return alert("Pilih file foto anak terlebih dahulu!");

            // Membuat nama file yang unik berdasarkan timestamp
            const fileExtension = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExtension}`;
            const filePath = `foto/${fileName}`;

            // A. Proses Upload File ke Supabase Storage Bucket bernama 'foto-siswa'
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('foto-siswa')
                .upload(filePath, file);

            if (uploadError) {
                return alert("Gagal mengunggah gambar: " + uploadError.message);
            }

            // B. Mengambil Public URL Gambar
            const { data: urlData } = supabase.storage
                .from('foto-siswa')
                .getPublicUrl(filePath);
            
            const publicUrlImage = urlData.publicUrl;

            // Output Hasil Sukses
            alert(`Pendaftaran Berhasil Dikirim!\nNama Siswa: ${namaAnak}\nFile foto aman tersimpan di storage cloud.`);
            formPendaftaran.reset();
        });
    </script>
</body>
</html>
