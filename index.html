<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB PAUD Online - Formulir Pendaftaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // JANGAN LUPA GANTI DENGAN URL & KEY SUPABASE MILIKMU SENDIRI
        const SUPABASE_URL = "https://xyz-id-kamu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">PAUD Sinergi</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="cek-status.html" class="btn btn-outline-light btn-sm me-2 fw-bold">🔍 Cek Status Kelulusan</a>
                <a href="admin.html" class="btn btn-warning btn-sm me-2 fw-bold">Menu Admin</a>
                <span class="text-white me-3 d-none d-sm-inline" id="user-display">Memuat user...</span>
                <button class="btn btn-danger btn-sm" id="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container my-5 text-center">
        <h1 class="display-5 fw-bold text-success">Penerimaan Siswa Baru (PPDB)</h1>
        <p class="lead text-secondary">Isi formulir pendaftaran di bawah ini secara lengkap.</p>
    </div>

    <div class="container col-md-6 mb-5">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white py-3">
                <h5 class="mb-0 fw-bold">Formulir Pendaftaran Siswa</h5>
            </div>
            <div class="card-body p-4">
                <form id="formPendaftaran">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Lengkap Anak</label>
                        <input type="text" id="namaAnak" class="form-control" placeholder="Contoh: Ahmad Fauzi" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tanggal Lahir</label>
                        <input type="date" id="tglLahir" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Wali / Orang Tua</label>
                        <input type="text" id="namaWali" class="form-control" placeholder="Contoh: Budi Santoso" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Upload Foto Anak</label>
                        <input type="file" id="fotoAnak" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn btn-success w-100 py-2 mt-3 fw-bold">Kirim Pendaftaran</button>
                </form>

                <div id="areaCetak" class="mt-4 text-center d-none">
                    <hr>
                    <h5 class="text-success fw-bold">Pendaftaran Berhasil Diterima!</h5>
                    <p class="small text-muted">Silakan cetak bukti pendaftaran di bawah ini sebagai tanda bukti fisik.</p>
                    <button type="button" class="btn btn-primary fw-bold px-4" onclick="cetakKartu()">
                        🖨️ Cetak Bukti Pendaftaran (PDF)
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 1. Proteksi Halaman Sesi Login
        async function cekSesi() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                alert("Sesi tidak ditemukan. Silakan login terlebih dahulu.");
                window.location.href = "login.html";
            } else {
                document.getElementById('user-display').innerText = `Masuk sebagai: ${session.user.email}`;
            }
        }
        cekSesi();

        // 2. Fitur Logout
        const btnLogout = document.getElementById('btn-logout');
        btnLogout.addEventListener('click', async () => {
            await supabase.auth.signOut();
            alert("Berhasil keluar.");
            window.location.href = "login.html";
        });

        // 3. Simpan Pendaftaran & Upload Gambar ke Supabase
        const formPendaftaran = document.getElementById('formPendaftaran');
        formPendaftaran.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerText = "Mengirim...";
            btnSubmit.disabled = true;
            
            const namaAnak = document.getElementById('namaAnak').value;
            const tglLahir = document.getElementById('tglLahir').value;
            const namaWali = document.getElementById('namaWali').value;
            const fileInput = document.getElementById('fotoAnak');
            const file = fileInput.files[0];

            if (!file) return alert("Pilih file foto anak terlebih dahulu!");

            // Penamaan unik file gambar dengan timestamp
            const fileExtension = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExtension}`;
            const filePath = `foto/${fileName}`;

            // A. Upload Foto ke Supabase Storage Bucket bernama 'foto-siswa'
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('foto-siswa')
                .upload(filePath, file);

            if (uploadError) {
                btnSubmit.innerText = "Kirim Pendaftaran";
                btnSubmit.disabled = false;
                return alert("Gagal upload gambar: " + uploadError.message);
            }

            // B. Ambil URL Foto Publik yang Sukses Di-upload
            const { data: urlData } = supabase.storage.from('foto-siswa').getPublicUrl(filePath);
            const publicUrlImage = urlData.publicUrl;

            // C. Masukkan Data ke Tabel 'pendaftar' di Supabase
            const { error: insertError } = await supabase
                .from('pendaftar')
                .insert([
                    { nama_anak: namaAnak, tanggal_lahir: tglLahir, nama_wali: namaWali, foto_url: publicUrlImage, status: 'Diproses' }
                ]);

            if (insertError) {
                alert("Gagal menyimpan data ke database: " + insertError.message);
            } else {
                alert(`Pendaftaran ${namaAnak} Berhasil Disimpan!`);
                // Munculkan tombol cetak PDF secara otomatis
                document.getElementById('areaCetak').classList.remove('d-none');
            }
            btnSubmit.innerText = "Kirim Pendaftaran";
            btnSubmit.disabled = false;
        });

        // 4. Fungsi Otomatis Cetak Kartu Bukti PDF
        function cetakKartu() {
            const nama = document.getElementById('namaAnak').value;
            const tgl = document.getElementById('tglLahir').value;
            const wali = document.getElementById('namaWali').value;

            const jendelaCetak = window.open('', '_blank');
            jendelaCetak.document.write(`
                <html>
                <head>
                    <title>Bukti Pendaftaran - ${nama}</title>
                    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
                    <style>
                        body { padding: 40px; font-family: sans-serif; background-color: #fff; }
                        .kartu { border: 4px dashed #198754; padding: 30px; border-radius: 15px; max-width: 700px; margin: 0 auto; }
                    </style>
                </head>
                <body>
                    <div class="kartu text-center">
                        <h2 class="text-success fw-bold mb-1">KARTU BUKTI PENDAFTARAN ONLINE</h2>
                        <h4 class="text-secondary mb-4">PAUD Sinergi Bangsa</h4>
                        <hr>
                        <table class="table table-bordered text-start my-4">
                            <tr><th width="35%">Nama Calon Siswa</th><td>${nama}</td></tr>
                            <tr><th>Tanggal Lahir</th><td>${tgl}</td></tr>
                            <tr><th>Nama Wali / Orang Tua</th><td>${wali}</td></tr>
                            <tr><th>Status Awal</th><td><b class="text-warning">Diproses (Menunggu Seleksi Admin)</b></td></tr>
                        </table>
                        <hr>
                        <p class="small text-muted">Bawa cetakan bukti pendaftaran ini beserta berkas fisik asli ketika datang melakukan verifikasi ke sekolah.</p>
                    </div>
                    <script>window.print();<\/script>
                </body>
                </html>
            `);
            jendelaCetak.document.close();
        }
    </script>
</body>
</html>
